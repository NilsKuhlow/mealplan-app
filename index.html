<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#FFFFFF">
  <title>Mealplan · Vorrat</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icons/icon-192.png">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">
      <div class="brand">
        <span class="brand-mark" id="brand-mark" aria-hidden="true">NK</span>
        <div class="brand-text">
          <h1>Mealplan</h1>
          <span id="week-label" class="week-label">—</span>
        </div>
      </div>
      <button id="reset-stock" class="icon-btn" title="Vorrat auf Soll-Bestand zurücksetzen" aria-label="Reset">⟲</button>
    </div>
  </header>

  <nav class="tabs" role="tablist">
    <button class="tab" data-tab="shopping" role="tab" aria-selected="true">Einkauf</button>
    <button class="tab" data-tab="today" role="tab">Heute</button>
    <button class="tab" data-tab="trend" role="tab">Verlauf</button>
    <button class="tab" data-tab="stock" role="tab">Vorrat</button>
    <button class="tab" data-tab="week" role="tab">Plan</button>
  </nav>

  <main id="content" class="content"></main>

  <template id="tpl-shopping">
    <section class="tab-panel">
      <div class="hint" id="shopping-hint"></div>
      <div id="shopping-list"></div>
    </section>
  </template>

  <template id="tpl-stock">
    <section class="tab-panel">
      <div class="hint">Tippe + oder − um den Bestand anzupassen. Lange drücken setzt auf 0.</div>
      <div id="stock-list"></div>
    </section>
  </template>

  <template id="tpl-today">
    <section class="tab-panel">
      <div class="today-head">
        <span class="label" id="today-date">Heute</span>
        <button id="today-reset" class="link-btn" type="button">Tag zurücksetzen</button>
      </div>
      <div id="macro-bars"></div>
      <div class="section-title">Tagesplan</div>
      <div id="today-list"></div>
    </section>
  </template>

  <template id="tpl-trend">
    <section class="tab-panel">
      <div class="trend-toolbar">
        <div class="seg" id="range-seg" role="tablist">
          <button class="seg-btn" data-range="week" aria-selected="true">Woche</button>
          <button class="seg-btn" data-range="month" aria-selected="false">Monat</button>
          <button class="seg-btn" data-range="year" aria-selected="false">Jahr</button>
        </div>
        <div class="seg seg-macro" id="macro-seg" role="tablist">
          <button class="seg-btn" data-macro="kcal" aria-selected="true">kcal</button>
          <button class="seg-btn" data-macro="p" aria-selected="false">Protein</button>
          <button class="seg-btn" data-macro="kh" aria-selected="false">KH</button>
          <button class="seg-btn" data-macro="f" aria-selected="false">Fett</button>
        </div>
      </div>
      <div class="chart-frame" id="chart-frame"></div>
      <div class="trend-stats" id="trend-stats"></div>
      <div class="section-title">Erinnerung</div>
      <div class="reminder-row" id="reminder-row"></div>
    </section>
  </template>

  <template id="tpl-week">
    <section class="tab-panel">
      <div id="week-meals"></div>
      <div class="section-title">Tagesbasis</div>
      <div id="daily-meals"></div>
      <div class="section-title">Rotationsplan</div>
      <div id="rotation-overview"></div>
    </section>
  </template>

  <div id="toast" class="toast" hidden></div>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
